spring:
  devtools:
    add-properties: false
    restart:
      enabled: true

  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:file:./data/test
    #    url: jdbc:h2:mem:test
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

  security:
    jwt:
      secret: ""
      access-token-duration: "5m"
      refresh-token-duration: "10m"

  member:
    signup:
      auth-token:
        secret: ""

  mail:
    # SMTP 서버 호스트
    host: "smtp.gmail.com"
    # SMTP 서버 포트
    port: 587
    # SMTP 서버 로그인 아이디
    username: ""
    # SMTP 서버 로그인 비밀번호
    password: ""
    properties:
      mail:
        smtp:
          # 사용자 인증 시도 여부
          auth: true
          starttls:
            # starttls 활성화 여부
            enable: true
    custom-props:
      sender:
        display-name: ""
        address: ""

cloudflare:
  r2:
    endpoint: ""
    access-key: ""
    secret-key: ""
    bucket-name: ""
    cdn: ""